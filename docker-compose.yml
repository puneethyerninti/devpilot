version: "3.8"

services:
  redis:
    image: redis:7
    ports: ["6379:6379"]
    restart: unless-stopped

  mongo:
    image: mongo:6
    ports: ["27017:27017"]
    restart: unless-stopped
    volumes:
      - ./mongo-data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    volumes:
      - ./qdrant-data:/qdrant/storage

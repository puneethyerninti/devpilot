services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devpilot
      POSTGRES_PASSWORD: devpilot
      POSTGRES_DB: devpilotdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - "6379:6379"

volumes:
  pgdata:

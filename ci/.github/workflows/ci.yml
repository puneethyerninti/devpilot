# // GENERATED FROM COPILOT PROMPT: DevPilot Phase3 MVP - adapt as needed
name: DevPilot CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: devpilot
          POSTGRES_PASSWORD: devpilot
          POSTGRES_DB: devpilotdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devpilot -d devpilotdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://devpilot:devpilot@localhost:5432/devpilotdb
      REDIS_URL: redis://localhost:6379
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
      GITHUB_PRIVATE_KEY: ${{ secrets.GITHUB_PRIVATE_KEY }}
      GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RENDER_DEPLOY_HOOK_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
      AI_MODE: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: true

      - name: Lint
        run: |
          pnpm --dir backend lint
          pnpm --dir frontend lint

      - name: Unit tests
        run: |
          pnpm --filter @devpilot/backend run test -- --runInBand --coverage
          pnpm --dir frontend test:coverage

      - name: Build packages
        run: |
          pnpm --dir backend build
          pnpm --dir worker build
          pnpm --dir frontend build

      - name: Integration stack
        run: |
          pnpm --dir backend prisma migrate deploy
          pnpm --dir backend prisma db seed

      - name: Deploy staging (Render)
        if: github.ref == 'refs/heads/main' && env.RENDER_DEPLOY_HOOK_STAGING != ''
        run: |
          curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_STAGING"

      - name: Deploy staging skipped
        if: github.ref == 'refs/heads/main' && env.RENDER_DEPLOY_HOOK_STAGING == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_STAGING is not configured; skipping automated staging deploy."

  e2e-optional:
    runs-on: ubuntu-latest
    needs: build-test
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: devpilot
          POSTGRES_PASSWORD: devpilot
          POSTGRES_DB: devpilotdb
        ports:
          - 5432:5432
      redis:
        image: redis:6
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://devpilot:devpilot@localhost:5432/devpilotdb
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: true
      - name: Run Playwright
        run: |
          pnpm --dir frontend exec playwright install --with-deps
          pnpm --dir frontend exec playwright test

  build-and-artifact:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2
          run_install: true

      - name: Build backend image
        run: |
          docker build -t devpilot-backend:ci -f Dockerfile .

      - name: Save backend image artifact
        run: |
          docker save devpilot-backend:ci | gzip > backend-image.tar.gz
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devpilot-backend-image
          path: backend-image.tar.gz

      - name: Secret scan
        run: |
          if git grep -n "BEGIN PRIVATE KEY" -- . ":!*.example" ":!.env.example"; then
            echo "Potential private key material committed";
            exit 1;
          fi
